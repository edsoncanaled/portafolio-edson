<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

@media (pointer:fine){
    html,body,a{
        cursor:none;
    }
}

body{
    font-family:'Courier Prime', monospace;
    background:#fff;
    color:#111;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:clamp(30px,5vw,60px);
    overflow:hidden;
}

/* CURSOR */
.cursor{
    width:10px;
    height:10px;
    background:#000;
    border-radius:50%;
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
    z-index:9999;
    transform:translate3d(-50%,-50%,0);
    transition:
        width .3s cubic-bezier(.23,1,.32,1),
        height .3s cubic-bezier(.23,1,.32,1),
        background-color .3s;
    will-change:transform;
}

.cursor.active{
    width:50px;
    height:50px;
    background:rgba(0,0,0,.05);
    border:1px solid rgba(0,0,0,.2);
}

/* HEADER */
.header-main{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    position:relative;
    z-index:20;
}

.brand-info{
    font-size:15px;
    font-weight:700;
    line-height:1.2;
}

.index-list{
    text-align:right;
    font-size:14px;
    line-height:1.6;
    list-style:none;
}

.index-item{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:40px;
}

.index-item a{
    text-decoration:none;
    color:inherit;
    position:relative;
}

.index-item a::after{
    content:'';
    position:absolute;
    bottom:1px;
    left:0;
    width:0;
    height:1px;
    background:#111;
    transition:width .35s cubic-bezier(.23,1,.32,1);
}

.index-item:hover a::after{
    width:100%;
}

.page-num{
    color:#999;
    font-size:13px;
    min-width:36px;
    text-align:right;
    transition:color .3s;
}

.index-item:hover .page-num{
    color:#111;
}

/* STRIP */
.strip-wrap{
    position:fixed;
    top:50%;
    left:0;
    width:100vw;
    transform:translateY(-50%);
    z-index:5;
    overflow:hidden;
}

.strip{
    display:flex;
    gap:6px;
    width:max-content;
    will-change:transform;
}

.thumb{
    flex:0 0 auto;
    width:40px;
    height:220px;
    overflow:hidden;
    position:relative;
    transition:width .55s cubic-bezier(.23,1,.32,1);
}

.thumb:hover{
    width:260px;
}

.thumb img{
    position:absolute;
    top:0;
    left:0;
    width:260px;
    height:100%;
    object-fit:cover;
    display:block;
    filter:grayscale(100%);
    transition:filter .5s ease;
}

.thumb:hover img{
    filter:grayscale(0%);
}

/* FOOTER */
.footer-portfolio{
    display:flex;
    align-items:center;
    gap:20px;
    position:relative;
    z-index:20;
}

.arrow{
    font-size:clamp(40px,8vw,80px);
    font-weight:300;
    transition:transform .4s cubic-bezier(.23,1,.32,1);
}

.footer-portfolio:hover .arrow{
    transform:translateX(12px);
}

.portfolio-title{
    font-size:clamp(50px,10vw,110px);
    font-weight:700;
    letter-spacing:-0.05em;
    line-height:.8;
}

a{
    text-decoration:none;
    color:inherit;
}

/* MOBILE */
@media(max-width:900px){

    .header-main{
        flex-direction:column;
        gap:30px;
    }

    .index-item{
        justify-content:flex-start;
    }

    .cursor{
        display:none;
    }

    .thumb{
        width:28px;
        height:160px;
    }

    .thumb:hover{
        width:28px;
    }

    .thumb img{
        width:180px;
        height:100%;
        object-fit:cover;
        filter:grayscale(100%);
    }
}
</style>
</head>
<body>

<div class="cursor"></div>

<div class="strip-wrap">
    <div class="strip" id="strip"></div>
</div>

<header class="header-main">
    <h1 class="brand-info">
        Edson Canales<br>
        <span style="font-weight:400;">Photographer</span>
    </h1>

    <ul class="index-list">
        <li class="index-item">
            <a href="CAMPTION.html">CAMPTION</a>
            <span class="page-num">3-8</span>
        </li>
        <li class="index-item">
            <a href="gallery.html">Editorials</a>
            <span class="page-num">22-25</span>
        </li>
        <li class="index-item">
            <a href="food&drinks.html">Food & Drinks</a>
            <span class="page-num">27-30</span>
        </li>
    </ul>
</header>

<footer class="footer-portfolio">
    <span class="arrow">→</span>
    <span class="portfolio-title">Portfolio</span>
</footer>

<script>
/* CURSOR SOLO DESKTOP */
const cursor = document.querySelector('.cursor');
const isTouch = window.matchMedia("(pointer: coarse)").matches;

if(!isTouch){
    document.addEventListener('mousemove', e=>{
        cursor.style.transform =
            `translate3d(${e.clientX}px,${e.clientY}px,0) translate(-50%,-50%)`;
    });

    document.querySelectorAll('a').forEach(link=>{
        link.addEventListener('mouseenter',()=>cursor.classList.add('active'));
        link.addEventListener('mouseleave',()=>cursor.classList.remove('active'));
    });
}

/* FOTOS */
const allPhotos = [
    'images/CAMPTION1.jpg',
    'images/CAMPTION1-1.jpg',
    'images/CAMPTION1-2.jpg',
    'images/CAMPTION1-3.jpg',
    'images/CAMPTION1-4.jpg',
    'images/CAMPTION1-5.jpg',
    'images/CAMPTION1-6.jpg',
    'images/MAR1.jpg',
    'images/MAR1-2.jpg',
    'images/MAR1-3.jpg',
    'images/MAR1-4.jpg',
    'images/MAR1-7.jpg',
    'images/MAR1-8.jpg',
    'images/NATS1.jpg',
    'images/NATS2.jpg',
    'images/NATS3.jpg',
    'images/NATS4.jpg',
    'images/foto1.jpg',
    'images/foto2.jpg',
    'images/foto3.jpg',
    'images/foto4.jpg',
    'images/foto5.jpg',
    'images/foto6.jpg'
];

const loopPhotos = [...allPhotos, ...allPhotos, ...allPhotos];

const strip = document.getElementById('strip');

loopPhotos.forEach(src=>{
    const div = document.createElement('div');
    div.className='thumb';

    const img=document.createElement('img');
    img.src=src;

    div.appendChild(img);
    strip.appendChild(div);
});

/* AUTO SCROLL */
let pos=0;
let speed=0.5;
let paused=false;

function tick(){
    if(!paused){
        pos+=speed;

        const totalW=strip.scrollWidth/3;

        if(pos>=totalW){
            pos-=totalW;
        }

        strip.style.transform=`translateX(-${pos}px)`;
    }

    requestAnimationFrame(tick);
}

tick();

/* PAUSA SOLO DESKTOP */
if(!isTouch){
    strip.addEventListener('mouseenter',()=>paused=true);
    strip.addEventListener('mouseleave',()=>paused=false);
}
</script>

</body>
</html>
