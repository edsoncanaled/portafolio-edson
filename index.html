<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  overflow:hidden;
}

/* HEADER */
.header{
  position:fixed;
  top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;
  font-size:12px;
  z-index:10;
}

/* STAGE */
.stage{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:1600px;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.gallery{
  position:relative;
  transform-style:preserve-3d;
}

/* CARD */
.card{
  position:absolute;
  width:220px;height:300px;
  cursor:pointer;
  transition:transform .6s cubic-bezier(.23,1,.32,1);
}

.card img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:6px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

/* TEXTO */
.meta{
  position:absolute;
  bottom:-22px;
  left:0;
  font-size:10px;
  letter-spacing:.08em;
  opacity:.6;
  transition:.3s;
}

.card.active .meta{
  opacity:1;
}

/* MOBILE */
.mobile-strip{display:none;}

@media (max-width:768px){

  body{overflow:auto;}

  .stage{display:none;}

  .mobile-strip{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:120px 20px;
  }

  .mobile-card{
    flex:0 0 auto;
    width:65vw;
    height:80vw;
  }

  .mobile-card img{
    width:100%;height:100%;
    object-fit:cover;
    border-radius:6px;
  }

}
</style>
</head>

<body>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Archive</div>
</div>

<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<div class="mobile-strip" id="mobile-strip"></div>

<script>

/* DATA CON TEXTO */
let basePhotos = [
  {src:'images/CAMPTION1.jpg', text:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg', text:'Industrial Silence'},
  {src:'images/CAMPTION1-2.jpg', text:'Concrete Frames'},
  {src:'images/CAMPTION1-3.jpg', text:'Urban Shadows'},
  {src:'images/MAR1.jpg', text:'Coastal Light'},
  {src:'images/MAR1-2.jpg', text:'Salt & Wind'},
  {src:'images/NATS1.jpg', text:'Still Movement'},
  {src:'images/NATS2.jpg', text:'Natural Study'},
  {src:'images/NATS3.jpg', text:'Field Notes'},
  {src:'images/NATS4.jpg', text:'Soft Horizon'}
];

/* 🔀 DESORDENAR */
basePhotos = basePhotos.sort(()=>Math.random()-0.5);

/* ♾️ CLONAR */
const photos = [...basePhotos, ...basePhotos, ...basePhotos];

const gallery=document.getElementById('gallery');

/* CREAR */
photos.forEach((p,i)=>{
  const card=document.createElement('div');
  card.className='card';

  const img=document.createElement('img');
  img.src=p.src;

  const meta=document.createElement('div');
  meta.className='meta';
  meta.textContent=p.text;

  card.appendChild(img);
  card.appendChild(meta);
  gallery.appendChild(card);

  card.addEventListener('click',()=>{
    if(card.classList.contains('active')){
      window.location.href='CAMPTION.html';
    }else{
      currentIndex=i;
      targetOffset=i*200;
    }
  });
});

const cards=document.querySelectorAll('.card');

/* ESTADO */
let currentIndex=Math.floor(photos.length/2);
let targetOffset=currentIndex*200;
let currentOffset=targetOffset;

/* LOOP INVISIBLE */
function normalizeLoop(){
  const total = basePhotos.length;

  if(currentIndex < total){
    currentIndex += total;
    targetOffset = currentIndex*200;
    currentOffset = targetOffset;
  }

  if(currentIndex >= total*2){
    currentIndex -= total;
    targetOffset = currentIndex*200;
    currentOffset = targetOffset;
  }
}

/* ANIMACIÓN */
function animate(){

  currentOffset += (targetOffset-currentOffset)*0.08;

  normalizeLoop();

  cards.forEach((card,i)=>{

    const x = i*200 - currentOffset;
    const dist = Math.abs(i-currentIndex);

    const y = x*0.25; // diagonal
    const z = -dist*100;

    const isActive = i===currentIndex;

    card.classList.toggle('active',isActive);

    card.style.transform=`
      translate3d(${x}px,${y}px,${z}px)
      rotateY(${isActive?0:-25}deg)
    `;

    card.style.opacity = isActive?1:0.5;
    card.style.zIndex = 1000-dist;

  });

  requestAnimationFrame(animate);
}

animate();

/* MOBILE */
const mobileStrip=document.getElementById('mobile-strip');

basePhotos.forEach(p=>{
  const div=document.createElement('div');
  div.className='mobile-card';

  const img=document.createElement('img');
  img.src=p.src;

  div.appendChild(img);
  mobileStrip.appendChild(div);

  div.onclick=()=>window.location.href='CAMPTION.html';
});

</script>

</body>
</html>
