<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  height:200vh;
  overflow:hidden;
}

/* CURSOR */
.cursor{
  width:10px;height:10px;background:#000;border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:.2s;
}
.cursor.active{
  width:40px;height:40px;
  background:rgba(0,0,0,.08);
}

/* HEADER */
.header{
  position:fixed;
  top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;
  z-index:10;
  font-size:12px;
}

/* STAGE */
.stage{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:1600px;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.gallery{
  position:relative;
  transform-style:preserve-3d;
}

/* CARDS */
.card{
  position:absolute;
  width:220px;height:300px;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.23,1,.32,1);
  cursor:pointer;
}

.card img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:6px;
  box-shadow:0 25px 60px rgba(0,0,0,0.18);
}

.meta{
  position:absolute;
  bottom:-18px;
  font-size:10px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="cursor"></div>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Archive</div>
</div>

<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<script>

/* CURSOR */
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`
});

/* IMÁGENES */
const photos=[
  'images/CAMPTION1.jpg',
  'images/CAMPTION1-1.jpg',
  'images/CAMPTION1-2.jpg',
  'images/CAMPTION1-3.jpg',
  'images/CAMPTION1-4.jpg',
  'images/CAMPTION1-5.jpg',
  'images/CAMPTION1-6.jpg',
  'images/MAR1.jpg',
  'images/MAR1-2.jpg',
  'images/MAR1-3.jpg',
  'images/MAR1-4.jpg',
  'images/MAR1-7.jpg',
  'images/MAR1-8.jpg',
  'images/NATS1.jpg',
  'images/NATS2.jpg',
  'images/NATS3.jpg',
  'images/NATS4.jpg'
];

const gallery=document.getElementById('gallery');

/* CREAR CARDS */
photos.forEach(src=>{
  const card=document.createElement('div');
  card.className='card';

  const img=document.createElement('img');
  img.src=src;

  const meta=document.createElement('div');
  meta.className='meta';
  meta.textContent='CAMPTION';

  card.appendChild(img);
  card.appendChild(meta);
  gallery.appendChild(card);
});

const cards=document.querySelectorAll('.card');

/* ESTADO */
let offset = 0;
let target = 0;
let velocity = 0;
let currentIndex = 0;

const spacing = 180; // distancia entre imágenes

/* CLICK */
cards.forEach((card,i)=>{
  card.addEventListener('click',()=>{
    if(currentIndex===i){
      window.location.href='CAMPTION.html';
    }else{
      currentIndex=i;
      target = i * spacing;
    }
  });
});

/* DRAG */
let down=false,startX=0;

document.addEventListener('mousedown',e=>{
  down=true;
  startX=e.clientX;
});

document.addEventListener('mouseup',()=>down=false);

document.addEventListener('mousemove',e=>{
  if(!down)return;

  const dx=e.clientX-startX;
  velocity=dx*0.2;
  target-=dx;
  startX=e.clientX;
});

/* LOOP INFINITO REAL */
function normalizeOffset(){
  const max = photos.length * spacing;

  if(offset > max){
    offset -= max;
    target -= max;
  }

  if(offset < -max){
    offset += max;
    target += max;
  }
}

/* ANIMACIÓN */
function animate(){

  velocity *= 0.9;
  offset += (target - offset)*0.08 + velocity;

  normalizeOffset();

  cards.forEach((card,i)=>{

    const base = i * spacing;
    const x = base - offset;

    /* DIAGONAL */
    const y = x * 0.25;
    const z = -Math.abs(x) * 0.15;

    const isActive = Math.abs(x) < spacing/2;

    card.style.transform = `
      translate3d(${x}px, ${y}px, ${z}px)
      rotateY(${x * 0.05}deg)
      scale(1)
    `;

    card.style.opacity = isActive ? 1 : 0.6;
    card.style.zIndex = 1000 - Math.abs(x);

  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
