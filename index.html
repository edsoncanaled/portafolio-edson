<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Premium Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  height:300vh;
  overflow:hidden;
}

/* CURSOR PRO */
.cursor{
  width:12px;height:12px;border:1px solid #000;border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:all .25s cubic-bezier(.23,1,.32,1);
}
.cursor.active{
  width:60px;height:60px;
  background:rgba(0,0,0,.04);
}

/* HEADER */
.header{
  position:fixed;top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;
  z-index:20;font-size:12px;
}

/* STAGE */
.stage{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:1800px;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.gallery{
  position:relative;
  transform-style:preserve-3d;
}

.card{
  position:absolute;
  width:240px;height:340px;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.23,1,.32,1);
  cursor:pointer;
}

.card img{
  width:100%;height:100%;object-fit:cover;
  border-radius:8px;
  box-shadow:0 30px 80px rgba(0,0,0,0.15);
}

.meta{
  position:absolute;
  bottom:-24px;
  left:0;
  font-size:10px;
  letter-spacing:.12em;
  opacity:.5;
}

/* FULLSCREEN VIEW */
.viewer{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .6s ease;
  z-index:50;
}

.viewer.active{
  opacity:1;
  pointer-events:auto;
}

.viewer img{
  max-width:80vw;
  max-height:80vh;
  object-fit:contain;
}

.close{
  position:absolute;
  top:40px;right:40px;
  font-size:14px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="cursor"></div>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Archive</div>
</div>

<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<div class="viewer" id="viewer">
  <div class="close" id="close">CLOSE</div>
  <img id="viewer-img" src="">
</div>

<script>

/* CURSOR */
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
});

/* DATA */
const photos=[
  {src:'images/CAMPTION1.jpg',title:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg',title:'B&W'},
  {src:'images/CAMPTION1-2.jpg',title:'B&W'},
  {src:'images/MAR1.jpg',title:'Shoot 2'},
  {src:'images/MAR1-2.jpg',title:'Shoot 2'},
  {src:'images/NATS1.jpg',title:'Shoot 3'},
  {src:'images/NATS2.jpg',title:'Shoot 3'}
];

const gallery=document.getElementById('gallery');

photos.forEach((p,i)=>{
  const card=document.createElement('div');
  card.className='card';

  const img=document.createElement('img');
  img.src=p.src;

  const meta=document.createElement('div');
  meta.className='meta';
  meta.textContent=p.title;

  card.appendChild(img);
  card.appendChild(meta);
  gallery.appendChild(card);
});

const cards=document.querySelectorAll('.card');

let current=0;
let target=0;
let currentOffset=0;
let velocity=0;

/* CLICK */
cards.forEach((card,i)=>{
  card.addEventListener('click',()=>{
    current=i;
    target=i*280;
    openViewer(photos[i].src);
  });
});

/* DRAG */
let down=false,startX=0;

document.addEventListener('mousedown',e=>{
  down=true;startX=e.clientX;
});

document.addEventListener('mouseup',()=>down=false);

document.addEventListener('mousemove',e=>{
  if(!down)return;
  let dx=e.clientX-startX;
  velocity=dx*0.1;
  target-=dx;
  startX=e.clientX;
});

/* INERCIA */
function animate(){
  velocity*=0.92;
  currentOffset += (target-currentOffset)*0.08 + velocity;

  cards.forEach((card,i)=>{
    const x=i*280-currentOffset;
    const z=-i*220;
    const active=i===current;

    card.style.transform=`
      translateX(${x}px)
      translateZ(${z}px)
      rotateY(${active?0:-28}deg)
      scale(${active?1.3:1})
    `;

    card.style.opacity=active?1:0.4;
    card.style.filter=`blur(${active?0:i*0.8}px)`;
    card.style.zIndex=active?999:i;
  });

  requestAnimationFrame(animate);
}

animate();

/* VIEWER */
const viewer=document.getElementById('viewer');
const viewerImg=document.getElementById('viewer-img');
const close=document.getElementById('close');

function openViewer(src){
  viewer.classList.add('active');
  viewerImg.src=src;
}

close.addEventListener('click',()=>{
  viewer.classList.remove('active');
});

</script>

</body>
</html>
