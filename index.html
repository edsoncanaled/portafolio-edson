<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
–bg: #e8e5e0;
–fg: #111;
–card-w: 260px;
–card-h: 174px; /* landscape, ratio ~3:2 */
}

html, body {
width:100%; height:100%;
overflow:hidden;
background:var(–bg);
color:var(–fg);
font-family:‘Courier Prime’, monospace;
cursor:grab;
user-select:none;
}
body:active { cursor:grabbing; }

/* ── HEADER ── */
header {
position:fixed;
top:32px; left:36px;
font-size:10px;
letter-spacing:.12em;
text-transform:uppercase;
line-height:1.7;
opacity:.55;
z-index:30;
pointer-events:none;
}

/* ── SCENE ── */
#scene {
position:fixed;
inset:0;
perspective: 1200px;
perspective-origin: 50% 42%;
}

/* el plano 3D que rota como isométrico */
#iso-plane {
position:absolute;
top:50%; left:50%;
transform-style: preserve-3d;
/* rotación isométrica fija — coincide con el GIF de referencia */
transform: translate(-50%,-50%)
rotateX(55deg)
rotateZ(-38deg);
will-change: transform;
}

/* ── CARD ── */
.card {
position:absolute;
width: var(–card-w);
height: var(–card-h);
transform-style: preserve-3d;
cursor:pointer;
}

.card img {
width:100%; height:100%;
object-fit:cover;
display:block;
/* sin border-radius para que parezca más editorial */
}

/* sombra falsa debajo de la card (plano aplastado) */
.card::after {
content:’’;
position:absolute;
inset:0;
top:4px; left:4px;
background:rgba(0,0,0,.22);
transform: translateZ(-2px) scale(1.01);
filter:blur(6px);
}

/* ── PIE DE FOTO ── */
.card .label {
position:absolute;
bottom: -18px;
left:0;
font-size:8px;
letter-spacing:.18em;
text-transform:uppercase;
color:var(–fg);
opacity:0;
transition:opacity .35s;
white-space:nowrap;
pointer-events:none;
/* contrarotamos para que el texto quede legible en pantalla */
transform: rotateZ(38deg) rotateX(-55deg) translateY(-2px);
transform-origin: left bottom;
}

.card.active .label { opacity:.7; }
.card.active img { outline: 1px solid rgba(0,0,0,.25); }

/* ── HINT ── */
.hint {
position:fixed;
bottom:28px; left:50%;
transform:translateX(-50%);
font-size:8px;
letter-spacing:.22em;
text-transform:uppercase;
opacity:.22;
pointer-events:none;
z-index:30;
}

/* ── MOBILE ── */
@media(max-width:768px){
#scene, .hint { display:none; }
html,body { overflow:auto; cursor:default; }

.mobile-strip {
display:flex;
flex-direction:column;
gap:0;
padding-top:90px;
}

.m-card {
position:relative;
cursor:pointer;
}

.m-card img {
width:100%;
height:56vw;
object-fit:cover;
display:block;
}

.m-label {
position:absolute;
bottom:10px; left:14px;
font-size:9px;
letter-spacing:.16em;
text-transform:uppercase;
color:#fff;
opacity:.85;
text-shadow:0 1px 4px rgba(0,0,0,.5);
}
}
@media(min-width:769px){
.mobile-strip { display:none; }
}
</style>

</head>
<body>

<header>
  Edson Canales&nbsp;&nbsp;/&nbsp;&nbsp;Photographer<br>
  Archive
</header>

<div id="scene">
  <div id="iso-plane"></div>
</div>

<div class="mobile-strip" id="mobile-strip"></div>

<div class="hint">← drag · scroll →</div>

<script>
/* ─────────────────────────────────
   DATOS
───────────────────────────────── */
const BASE = [
  {src:'images/CAMPTION1.jpg',   text:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg', text:'Industrial Silence'},
  {src:'images/CAMPTION1-2.jpg', text:'Concrete Frames'},
  {src:'images/CAMPTION1-3.jpg', text:'Urban Shadows'},
  {src:'images/MAR1.jpg',        text:'Coastal Light'},
  {src:'images/MAR1-2.jpg',      text:'Salt & Wind'},
  {src:'images/NATS1.jpg',       text:'Still Movement'},
  {src:'images/NATS2.jpg',       text:'Natural Study'},
  {src:'images/NATS3.jpg',       text:'Field Notes'},
  {src:'images/NATS4.jpg',       text:'Soft Horizon'}
];

function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){
    const j=0|Math.random()*(i+1);
    [r[i],r[j]]=[r[j],r[i]];
  }
  return r;
}

const photos = shuffle(BASE);
const N      = photos.length;

/* ─────────────────────────────────
   LAYOUT EN EL PLANO ISOMÉTRICO
   Las cards se colocan en una línea
   sobre el eje X del plano 3D.
   STEP = espacio entre cards.
───────────────────────────────── */
const CARD_W = 260;
const CARD_H = 174;
const STEP   = 280;   /* separación centro a centro */
const COPIES = 9;     /* buffer para loop infinito  */
const TOTAL  = N * COPIES;
const CYCLE  = N * STEP;

const plane    = document.getElementById('iso-plane');
const allCards = [];

for(let i=0;i<TOTAL;i++){
  const p   = photos[i % N];
  const el  = document.createElement('div');
  el.className='card';

  const img = document.createElement('img');
  img.src=p.src; img.alt=p.text;
  img.draggable=false;

  const lbl = document.createElement('div');
  lbl.className='label';
  lbl.textContent=p.text;

  el.appendChild(img);
  el.appendChild(lbl);
  plane.appendChild(el);
  allCards.push(el);

  /* click → navegar si ya está activa */
  el.addEventListener('click',()=>{
    if(el.classList.contains('active'))
      window.location.href='CAMPTION.html';
  });
}

/* posición estática de cada card en el plano */
allCards.forEach((el,i)=>{
  el.style.left = (i*STEP - CARD_W/2)+'px';
  el.style.top  = (-CARD_H/2)+'px';
});

/* ─────────────────────────────────
   SCROLL STATE
───────────────────────────────── */
/* empezar centrado en el card del medio */
let offset   = Math.floor(TOTAL/2) * STEP;
let velocity = 0;
let dragging = false, drag0=0, off0=0;

/* ─────────────────────────────────
   RENDER
───────────────────────────────── */
function render(){
  if(!dragging){
    velocity *= 0.91;
    offset   += velocity;
  }

  /* loop sin salto — mantener offset en zona central del buffer */
  if(offset < CYCLE*3) offset += CYCLE;
  if(offset > CYCLE*6) offset -= CYCLE;

  /* trasladar el plano para centrar la card activa */
  plane.style.transform =
    `translate(-50%,-50%)
     rotateX(55deg)
     rotateZ(-38deg)
     translateX(${-offset}px)`;

  /* card activa = la que está en X=0 del plano (centro de pantalla) */
  /* en coordenadas del plano, la card i está en x = i*STEP - offset
     → activa cuando i*STEP ≈ offset                                  */
  const activeIdx = Math.round(offset / STEP);

  allCards.forEach((el,i)=>{
    const dx  = Math.abs(i - activeIdx);
    const alpha = Math.max(0.08, 1 - dx*0.18);
    el.style.opacity = alpha;
    el.classList.toggle('active', i===activeIdx);
  });

  requestAnimationFrame(render);
}
render();

/* ─────────────────────────────────
   EVENTOS
───────────────────────────────── */
const scene = document.getElementById('scene');

/* mouse drag */
scene.addEventListener('mousedown',e=>{
  dragging=true; drag0=e.clientX; off0=offset; velocity=0;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  /* en el plano isométrico, el arrastre en X de pantalla
     no corresponde 1:1 — ajustamos con un factor visual */
  offset = off0 - (e.clientX - drag0)*1.8;
});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;
  dragging=false;
  velocity = -(e.clientX - drag0)*0.09;
});

/* touch */
scene.addEventListener('touchstart',e=>{
  dragging=true; drag0=e.touches[0].clientX; off0=offset; velocity=0;
},{passive:true});
scene.addEventListener('touchmove',e=>{
  if(!dragging)return;
  offset=off0-(e.touches[0].clientX-drag0)*1.8;
},{passive:true});
scene.addEventListener('touchend',e=>{
  dragging=false;
  velocity=-(e.changedTouches[0].clientX-drag0)*0.1;
});

/* rueda */
scene.addEventListener('wheel',e=>{
  e.preventDefault();
  velocity += (e.deltaY+e.deltaX)*1.1;
},{passive:false});

/* ─────────────────────────────────
   MOBILE STRIP
───────────────────────────────── */
const strip = document.getElementById('mobile-strip');
photos.forEach(p=>{
  const div=document.createElement('div');
  div.className='m-card';

  const img=document.createElement('img');
  img.src=p.src; img.alt=p.text;

  const lbl=document.createElement('div');
  lbl.className='m-label';
  lbl.textContent=p.text;

  div.appendChild(img);
  div.appendChild(lbl);
  strip.appendChild(div);
  div.onclick=()=>window.location.href='CAMPTION.html';
});
</script>

</body>
</html>
