<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  height:300vh;
}

/* CURSOR */
.cursor{
  width:10px;height:10px;background:#000;border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}

/* HEADER */
.header-main{
  position:fixed;top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;z-index:10;
}

/* STAGE 3D */
.stage{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:1400px;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.gallery{
  position:relative;
  transform-style:preserve-3d;
}

.card{
  position:absolute;
  width:220px;height:300px;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.23,1,.32,1), filter .4s;
}

.card img{
  width:100%;height:100%;object-fit:cover;
  border-radius:6px;
  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.meta{
  position:absolute;
  bottom:-22px;
  left:0;
  font-size:10px;
  letter-spacing:.08em;
  opacity:.6;
}

.card:hover{
  transform:rotateY(0deg) scale(1.12) !important;
  z-index:999;
}

</style>
</head>
<body>

<div class="cursor"></div>

<header class="header-main">
  <div>Edson Canales<br><span style="font-weight:400">Photographer</span></div>
  <div>Portfolio</div>
</header>

<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<script>

/* CURSOR */
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
});

/* DATA (reuse your images) */
const photos=[
  {src:'images/CAMPTION1.jpg',title:'Camption — B&W'},
  {src:'images/CAMPTION1-1.jpg',title:'Camption'},
  {src:'images/CAMPTION1-2.jpg',title:'Camption'},
  {src:'images/CAMPTION1-3.jpg',title:'Camption'},
  {src:'images/CAMPTION1-4.jpg',title:'Camption'},
  {src:'images/MAR1.jpg',title:'Shoot 2'},
  {src:'images/MAR1-2.jpg',title:'Shoot 2'},
  {src:'images/NATS1.jpg',title:'Shoot 3'},
  {src:'images/NATS2.jpg',title:'Shoot 3'}
];

const gallery=document.getElementById('gallery');

photos.forEach((p,i)=>{
  const card=document.createElement('div');
  card.classList.add('card');

  const img=document.createElement('img');
  img.src=p.src;

  const meta=document.createElement('div');
  meta.classList.add('meta');
  meta.textContent=p.title;

  card.appendChild(img);
  card.appendChild(meta);
  gallery.appendChild(card);
});

const cards=document.querySelectorAll('.card');

function update(){
  const scroll=window.scrollY;

  cards.forEach((card,i)=>{
    const x=i*260 - scroll*0.6;
    const z=-i*180;
    const rot=-25;

    const depthFactor=Math.max(0,1 - i*0.08);

    card.style.transform=`translateX(${x}px) translateZ(${z}px) rotateY(${rot}deg)`;
    card.style.opacity=depthFactor;
    card.style.filter=`blur(${i*0.5}px)`;
  });

  requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
