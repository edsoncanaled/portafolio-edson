<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  height:300vh;
  overflow-x:hidden;
}

/* CURSOR */
.cursor{
  width:10px;height:10px;background:#000;border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:.2s;
}
.cursor.active{
  width:40px;height:40px;
  background:rgba(0,0,0,.08);
}

/* HEADER */
.header{
  position:fixed;
  top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;
  z-index:10;
  font-size:12px;
}

/* STAGE */
.stage{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:1600px;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.gallery{
  position:relative;
  transform-style:preserve-3d;
}

.card{
  position:absolute;
  width:220px;height:300px;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.23,1,.32,1);
  cursor:pointer;
}

.card img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:6px;
  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.meta{
  position:absolute;
  bottom:-20px;
  left:0;
  font-size:10px;
  letter-spacing:.08em;
  opacity:.6;
}

/* HOVER */
.card:hover{
  z-index:999;
}
</style>
</head>

<body>

<div class="cursor"></div>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Portfolio</div>
</div>

<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<script>

/* CURSOR */
const cursor=document.querySelector('.cursor');

document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
});

document.querySelectorAll('a, .card').forEach(el=>{
  el.addEventListener('mouseenter',()=>cursor.classList.add('active'));
  el.addEventListener('mouseleave',()=>cursor.classList.remove('active'));
});

/* DATA */
const photos=[
  {src:'images/CAMPTION1.jpg',title:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg',title:'B&W Series'},
  {src:'images/CAMPTION1-2.jpg',title:'B&W Series'},
  {src:'images/CAMPTION1-3.jpg',title:'B&W Series'},
  {src:'images/MAR1.jpg',title:'Shoot 2'},
  {src:'images/MAR1-2.jpg',title:'Shoot 2'},
  {src:'images/NATS1.jpg',title:'Shoot 3'},
  {src:'images/NATS2.jpg',title:'Shoot 3'}
];

const gallery=document.getElementById('gallery');

/* CREAR CARDS */
photos.forEach((p,i)=>{
  const card=document.createElement('div');
  card.className='card';

  const img=document.createElement('img');
  img.src=p.src;

  const meta=document.createElement('div');
  meta.className='meta';
  meta.textContent=p.title;

  card.appendChild(img);
  card.appendChild(meta);
  gallery.appendChild(card);
});

const cards=document.querySelectorAll('.card');

/* ESTADO */
let currentIndex=0;
let targetOffset=0;
let currentOffset=0;
let scrollInfluence=0;

/* CLICK */
cards.forEach((card,i)=>{
  card.addEventListener('click',()=>{
    currentIndex=i;
    targetOffset=i*260;
  });
});

/* SCROLL */
window.addEventListener('scroll',()=>{
  scrollInfluence=window.scrollY*0.4;
});

/* DRAG (MOUSE) */
let isDragging=false;
let startX=0;

document.addEventListener('mousedown',e=>{
  isDragging=true;
  startX=e.clientX;
});

document.addEventListener('mouseup',()=>{
  isDragging=false;
});

document.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const delta=(e.clientX-startX)*0.8;
  targetOffset-=delta;
  startX=e.clientX;
});

/* ANIMACIÓN */
function animate(){

  /* inercia */
  currentOffset += (targetOffset-currentOffset)*0.08;

  cards.forEach((card,i)=>{

    const baseX=i*260;

    const x=baseX-currentOffset-scrollInfluence;
    const z=-i*180;

    const isActive=i===currentIndex;

    card.style.transform=`
      translateX(${x}px)
      translateZ(${z}px)
      rotateY(${isActive?0:-25}deg)
      scale(${isActive?1.25:1})
    `;

    card.style.filter=`blur(${isActive?0:i*0.6}px)`;
    card.style.opacity=isActive?1:Math.max(0.3,1-i*0.08);
    card.style.zIndex=isActive?999:i;

  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
