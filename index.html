<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
width:100%; height:100%;
overflow:hidden;
background:#e8e5e0;
font-family:‘Courier Prime’, monospace;
cursor:grab;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}
body:active { cursor:grabbing; }

header {
position:fixed;
top:28px; left:28px;
font-size:10px;
letter-spacing:.12em;
text-transform:uppercase;
line-height:1.8;
opacity:.45;
z-index:30;
pointer-events:none;
}

#canvas {
position:fixed;
inset:0;
overflow:hidden;
perspective:2000px;
perspective-origin:50% 50%;
}

.card {
position:absolute;
transform-origin:center center;
}
.card img {
display:block;
width:100%; height:100%;
object-fit:cover;
pointer-events:none;
}

/* info overlay solo en card activa */
.info {
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:10px 12px;
background:linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 60%);
opacity:0;
transition:opacity .3s;
pointer-events:none;
}
.card.active .info { opacity:1; }
.info .project {
font-size:10px;
letter-spacing:.16em;
text-transform:uppercase;
color:#fff;
}
.info .sub {
font-size:8px;
letter-spacing:.1em;
text-transform:uppercase;
color:rgba(255,255,255,.5);
margin-top:2px;
}

.hint {
position:fixed;
bottom:22px; left:50%;
transform:translateX(-50%);
font-size:8px;
letter-spacing:.2em;
text-transform:uppercase;
opacity:.18;
pointer-events:none;
z-index:30;
}
</style>

</head>
<body>

<header>
  Edson Canales&nbsp;/&nbsp;Photographer<br>
  Archive
</header>

<div id="canvas"></div>
<div class="hint">← arrastra →</div>

<script>
const BASE = [
  {src:'images/CAMPTION1.jpg',   text:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg', text:'Industrial Silence'},
  {src:'images/CAMPTION1-2.jpg', text:'Concrete Frames'},
  {src:'images/CAMPTION1-3.jpg', text:'Urban Shadows'},
  {src:'images/MAR1.jpg',        text:'Coastal Light'},
  {src:'images/MAR1-2.jpg',      text:'Salt & Wind'},
  {src:'images/NATS1.jpg',       text:'Still Movement'},
  {src:'images/NATS2.jpg',       text:'Natural Study'},
  {src:'images/NATS3.jpg',       text:'Field Notes'},
  {src:'images/NATS4.jpg',       text:'Soft Horizon'}
];

function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){
    const j=0|Math.random()*(i+1);
    [r[i],r[j]]=[r[j],r[i]];
  }
  return r;
}

const photos   = shuffle(BASE);
const N        = photos.length;
const isMobile = window.innerWidth <= 768;

/* card 7:5 landscape */
const CARD_W = isMobile ? 200 : 300;
const CARD_H = Math.round(CARD_W * 5/7);

/* rotación del playground */
const RX = -37, RY = -44, RZ = -1;
const RAD = RZ * Math.PI/180;
const COS = Math.cos(RAD);
const SIN = Math.sin(RAD);

/*
  LAYOUT — igual que el GIF:
  - STACK_STEP: paso entre cards dentro de cada grupo (muy pequeño = muy apiladas)
  - GAP: espacio entre el grupo izquierdo y la card activa,
          y entre la card activa y el grupo derecho
*/
const STACK_STEP = Math.round(CARD_W * 0.07); /* muy solapadas */
const GAP        = CARD_W * 1.1;              /* espacio a cada lado de la activa */

const COPIES = 9;
const TOTAL  = N * COPIES;
const CYCLE  = N * STACK_STEP;

const canvas   = document.getElementById('canvas');
const allCards = [];

for(let i=0;i<TOTAL;i++){
  const p  = photos[i % N];
  const el = document.createElement('div');
  el.className='card';
  el.style.width  = CARD_W+'px';
  el.style.height = CARD_H+'px';

  const img = document.createElement('img');
  img.src=p.src; img.alt=p.text;
  img.draggable=false;

  const info = document.createElement('div');
  info.className='info';
  const proj = document.createElement('div');
  proj.className='project'; proj.textContent=p.text;
  const sub  = document.createElement('div');
  sub.className='sub'; sub.textContent='Edson Canales';
  info.appendChild(proj); info.appendChild(sub);

  el.appendChild(img);
  el.appendChild(info);
  canvas.appendChild(el);
  allCards.push(el);

  el.addEventListener('click',()=>{
    if(el.classList.contains('active'))
      window.location.href='CAMPTION.html';
  });
}

let offset   = Math.floor(TOTAL/2) * STACK_STEP;
let velocity = 0;
let dragging = false, drag0=0, off0=0;

function render(){
  if(!dragging){
    /* snap a la card más cercana */
    const nearest = Math.round(offset / STACK_STEP) * STACK_STEP;
    velocity += (nearest - offset) * 0.06;
    velocity *= 0.75;
    offset   += velocity;
  }

  if(offset < CYCLE*3) offset += CYCLE;
  if(offset > CYCLE*6) offset -= CYCLE;

  const vw       = window.innerWidth;
  const vh       = window.innerHeight;
  const cx       = vw/2;
  const cy       = vh/2;
  const activeIdx = Math.round(offset / STACK_STEP);

  allCards.forEach((el,i)=>{
    /* índice relativo normalizado */
    let rel = i - activeIdx;
    while(rel >  N/2) rel -= N;
    while(rel < -N/2) rel += N;
    const absRel = Math.abs(rel);

    /* ocultar lejanas */
    if(absRel > N){ el.style.opacity=0; return; }

    const isActive = rel === 0;

    /*
      Posición en el eje de la tira:
      - activa: d = 0, levantada -LIFT en Y de pantalla
      - grupo derecho (rel > 0): empieza en +GAP desde el centro
      - grupo izquierdo (rel < 0): empieza en -GAP desde el centro
    */
    let d, liftY=0;
    if(isActive){
      d     = 0;
      liftY = -28; /* sube un poco */
    } else if(rel > 0){
      d = GAP + (rel - 1) * STACK_STEP;
    } else {
      d = -GAP + (rel + 1) * STACK_STEP;
    }

    const sx = cx + d * COS;
    const sy = cy + d * SIN + liftY;

    el.style.transform =
      `translate(${sx - CARD_W/2}px, ${sy - CARD_H/2}px)
       rotateX(${RX}deg) rotateY(${RY}deg) rotateZ(${RZ}deg)
       scale(${isActive ? 1.1 : 1})`;

    /* z-index: activa arriba, grupo derecho encima del izquierdo */
    el.style.zIndex  = isActive ? 9999
                     : rel > 0  ? 1000 - rel
                     :            rel + 500;

    el.style.opacity = isActive ? 1 : Math.max(0.1, 1 - absRel*0.12);
    el.classList.toggle('active', isActive);
  });

  requestAnimationFrame(render);
}
render();

/* eventos */
canvas.addEventListener('mousedown',e=>{
  dragging=true; drag0=e.clientX; off0=offset; velocity=0;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  offset=off0-(e.clientX-drag0)*1.0;
});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;
  dragging=false;
  velocity=-(e.clientX-drag0)*0.06;
});

canvas.addEventListener('touchstart',e=>{
  dragging=true; drag0=e.touches[0].clientX; off0=offset; velocity=0;
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(!dragging)return;
  offset=off0-(e.touches[0].clientX-drag0)*1.0;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  dragging=false;
  velocity=-(e.changedTouches[0].clientX-drag0)*0.06;
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  velocity+=(e.deltaY+e.deltaX)*0.8;
},{passive:false});
</script>

</body>
</html>
