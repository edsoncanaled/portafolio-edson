<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  height:100vh;
  overflow:hidden;
}

/* HEADER */
.header{
  position:absolute;
  top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;
  font-size:12px;
  z-index:10;
}

/* STAGE */
.stage{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:2000px;
  width:100%;
  display:flex;
  justify-content:center;
}

/* GALERÍA */
.gallery{
  position:relative;
  width:1000px;
  height:400px;
  transform-style:preserve-3d;
}

/* TARJETAS */
.card{
  position:absolute;
  width:180px;
  height:260px;
  left:50%;
  top:50%;
  transform-origin:center center;
  transition:transform .8s cubic-bezier(.23,1,.32,1);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:6px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

/* TEXTO */
.meta{
  position:absolute;
  bottom:-22px;
  width:100%;
  text-align:center;
  font-size:10px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Archive</div>
</div>

<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<script>

/* 🔥 TODAS TUS IMÁGENES */
const photos = [
  'images/CAMPTION1.jpg',
  'images/CAMPTION1-1.jpg',
  'images/CAMPTION1-2.jpg',
  'images/CAMPTION1-3.jpg',
  'images/CAMPTION1-4.jpg',
  'images/CAMPTION1-5.jpg',
  'images/CAMPTION1-6.jpg',
  'images/MAR1.jpg',
  'images/MAR1-2.jpg',
  'images/MAR1-3.jpg',
  'images/MAR1-4.jpg',
  'images/MAR1-7.jpg',
  'images/MAR1-8.jpg',
  'images/NATS1.jpg',
  'images/NATS2.jpg',
  'images/NATS3.jpg',
  'images/NATS4.jpg'
];

const gallery = document.getElementById('gallery');

/* CREAR */
photos.forEach((src,i)=>{
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = 'CAMPTION';

  card.appendChild(img);
  card.appendChild(meta);
  gallery.appendChild(card);
});

const cards = document.querySelectorAll('.card');

let current = 0;
let target = 0;
let angle = 0;

/* CLICK DOBLE LÓGICA */
cards.forEach((card,i)=>{
  card.addEventListener('click',()=>{
    if(current === i){
      window.location.href = 'CAMPTION.html';
    }else{
      current = i;
      target = i;
    }
  });
});

/* DRAG */
let down=false,startX=0;

document.addEventListener('mousedown',e=>{
  down=true;
  startX=e.clientX;
});

document.addEventListener('mouseup',()=>down=false);

document.addEventListener('mousemove',e=>{
  if(!down)return;
  const dx = e.clientX - startX;
  target -= dx * 0.01;
  startX = e.clientX;
});

/* ANIMACIÓN */
function animate(){

  angle += (target - angle) * 0.08;

  cards.forEach((card,i)=>{

    const offset = i - angle;

    const rotateY = offset * 12;     // curva
    const translateZ = -Math.abs(offset) * 80; // profundidad
    const translateX = offset * 90;  // separación

    const scale = i === current ? 1.2 : 0.9;

    card.style.transform = `
      translate(-50%, -50%)
      rotateY(${rotateY}deg)
      translateX(${translateX}px)
      translateZ(${translateZ}px)
      scale(${scale})
    `;

    card.style.opacity = Math.abs(offset) > 6 ? 0 : 1;
    card.style.zIndex = 100 - Math.abs(offset);
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
