<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Courier Prime', monospace;
    background:#fff;
    color:#111;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:clamp(30px,5vw,60px);
    overflow:hidden;
}

/* HEADER */
.header-main{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.brand-info{
    font-size:15px;
    font-weight:700;
}

/* NAV CARDS */
.index-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.index-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    border:1px solid rgba(0,0,0,0.1);
    background:#fafafa;
    text-decoration:none;
    color:inherit;
    transition:all .3s ease;
}

.index-item:hover{
    background:#111;
    color:#fff;
    transform:translateX(-6px);
}

.page-num{
    opacity:0.5;
    font-size:13px;
}

/* STRIP */
.strip-wrap{
    position:fixed;
    top:50%;
    left:0;
    width:100vw;
    transform:translateY(-50%);
    overflow:hidden;
}

.strip{
    display:flex;
    gap:6px;
    width:max-content;
}

.thumb{
    width:40px;
    height:220px;
    overflow:hidden;
    position:relative;
    transition:width .5s ease;
}

.thumb:hover{
    width:260px;
}

.thumb img{
    position:absolute;
    width:260px;
    height:100%;
    object-fit:cover;
    filter:grayscale(100%);
    transition:.4s;
}

.thumb:hover img{
    filter:grayscale(0%);
}

/* FOOTER */
.footer-portfolio{
    display:flex;
    align-items:center;
    gap:20px;
}

.portfolio-title{
    font-size:clamp(50px,10vw,110px);
    font-weight:700;
}

/* MOBILE */
@media(max-width:900px){
    .thumb{
        width:28px;
        height:160px;
    }
    .thumb img{
        width:180px;
    }
}
</style>
</head>
<body>

<header class="header-main">
    <h1 class="brand-info">
        Edson Canales<br>
        <span style="font-weight:400;">Photographer</span>
    </h1>

    <nav class="index-list">
        <a href="CAMPTION.html" class="index-item">
            <span>CAMPTION</span>
            <span class="page-num">3-8</span>
        </a>
        <a href="gallery.html" class="index-item">
            <span>Editorials</span>
            <span class="page-num">22-25</span>
        </a>
        <a href="food&drinks.html" class="index-item">
            <span>Food & Drinks</span>
            <span class="page-num">27-30</span>
        </a>
    </nav>
</header>

<div class="strip-wrap">
    <div class="strip" id="strip"></div>
</div>

<footer class="footer-portfolio">
    <span>→</span>
    <span class="portfolio-title">Portfolio</span>
</footer>

<script>
/* IMÁGENES OPTIMIZADAS */
const photos = [
'images/CAMPTION1.jpg',
'images/CAMPTION1-1.jpg',
'images/CAMPTION1-2.jpg',
'images/MAR1.jpg',
'images/NATS1.jpg',
'images/foto1.jpg',
'images/foto2.jpg'
];

const strip = document.getElementById('strip');

/* SOLO duplicamos 2 veces (optimizado) */
const loop = [...photos, ...photos];

loop.forEach(src=>{
    const div = document.createElement('div');
    div.className = 'thumb';

    const img = document.createElement('img');
    img.src = src;
    img.loading = "lazy";
    img.decoding = "async";

    div.appendChild(img);
    strip.appendChild(div);
});

/* SCROLL CON INERCIA (LERP) */
let current = 0;
let target = 0;
const speed = 0.05;

function animate(){
    target += 0.4; // velocidad base

    current += (target - current) * speed;

    const total = strip.scrollWidth / 2;

    if(current >= total){
        current -= total;
        target -= total;
    }

    strip.style.transform = `translateX(-${current}px)`;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
