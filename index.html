<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:‘Courier Prime’,monospace;
background:#f0ede8;
color:#111;
overflow:hidden;
height:100vh;
width:100vw;
}

.header{
position:fixed;
top:36px;left:40px;right:40px;
display:flex;justify-content:space-between;
font-size:11px;
letter-spacing:.1em;
text-transform:uppercase;
z-index:20;
opacity:.6;
}

.stage{
position:fixed;
inset:0;
overflow:hidden;
cursor:grab;
}
.stage:active{ cursor:grabbing; }

#track{
position:absolute;
top:0;left:0;
will-change:transform;
}

.card{
position:absolute;
width:190px;
cursor:pointer;
will-change:opacity;
}

.card img{
width:190px;
height:255px;
object-fit:cover;
border-radius:3px;
display:block;
box-shadow:
4px 4px 0 rgba(0,0,0,.07),
10px 10px 28px rgba(0,0,0,.18);
transition:box-shadow .3s;
}

.card.active img{
box-shadow:
4px 4px 0 rgba(0,0,0,.1),
16px 16px 40px rgba(0,0,0,.28);
}

.meta{
margin-top:8px;
font-size:9px;
letter-spacing:.14em;
text-transform:uppercase;
opacity:0;
transition:opacity .4s;
white-space:nowrap;
color:#111;
}
.card.active .meta{ opacity:.6; }

.hint{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:9px;
letter-spacing:.18em;
text-transform:uppercase;
opacity:.25;
z-index:20;
pointer-events:none;
}

/* MOBILE */
@media(max-width:768px){
.stage,.hint{ display:none; }
body{ overflow:auto; }

.mobile-strip{
display:flex;
flex-direction:column;
gap:32px;
padding:100px 28px 60px;
}

.mobile-card{
display:flex;
flex-direction:column;
gap:8px;
cursor:pointer;
}

.mobile-card img{
width:100%;
height:72vw;
object-fit:cover;
border-radius:4px;
box-shadow:0 8px 24px rgba(0,0,0,.15);
display:block;
}

.mobile-card .mobile-meta{
font-size:10px;
letter-spacing:.14em;
text-transform:uppercase;
opacity:.55;
}
}

@media(min-width:769px){
.mobile-strip{ display:none; }
}
</style>

</head>
<body>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Archive</div>
</div>

<div class="stage" id="stage">
  <div id="track"></div>
</div>

<div class="mobile-strip" id="mobile-strip"></div>

<div class="hint">← arrastra o usa la rueda →</div>

<script>
const basePhotos = [
  {src:'images/CAMPTION1.jpg',   text:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg', text:'Industrial Silence'},
  {src:'images/CAMPTION1-2.jpg', text:'Concrete Frames'},
  {src:'images/CAMPTION1-3.jpg', text:'Urban Shadows'},
  {src:'images/MAR1.jpg',        text:'Coastal Light'},
  {src:'images/MAR1-2.jpg',      text:'Salt & Wind'},
  {src:'images/NATS1.jpg',       text:'Still Movement'},
  {src:'images/NATS2.jpg',       text:'Natural Study'},
  {src:'images/NATS3.jpg',       text:'Field Notes'},
  {src:'images/NATS4.jpg',       text:'Soft Horizon'}
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const photos  = shuffle(basePhotos);
const N       = photos.length;
const CARD_W  = 190;
const CARD_H  = 255;
const STEP_X  = 155;
const STEP_Y  = -70;
const COPIES  = 9;
const TOTAL   = N * COPIES;
const CYCLE   = N * STEP_X;

const track = document.getElementById('track');
const stage = document.getElementById('stage');
const allCards = [];

for(let i=0;i<TOTAL;i++){
  const p    = photos[i % N];
  const card = document.createElement('div');
  card.className='card';

  const img=document.createElement('img');
  img.src=p.src; img.alt=p.text;

  const meta=document.createElement('div');
  meta.className='meta';
  meta.textContent=p.text;

  card.appendChild(img);
  card.appendChild(meta);
  track.appendChild(card);
  allCards.push(card);

  card.addEventListener('click',()=>{
    if(card.classList.contains('active'))
      window.location.href='CAMPTION.html';
  });
}

/* posición fija de cada card en el track */
allCards.forEach((card,i)=>{
  card.style.left = (i*STEP_X)+'px';
  card.style.top  = (i*STEP_Y)+'px';
});

/* empezar centrado en el card del medio */
const CENTER_IDX = Math.floor(TOTAL/2);
let offset   = CENTER_IDX * STEP_X;
let velocity = 0;
let dragging = false, dragX0=0, dragOff0=0;

function render(){
  if(!dragging){
    velocity *= 0.90;
    offset   += velocity;
  }

  /* loop sin salto — mantenerse en zona central del buffer */
  if(offset < CYCLE*3) offset += CYCLE;
  if(offset > CYCLE*6) offset -= CYCLE;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  /*
    Queremos que la card cuyo centro horizontal sea "offset"
    aparezca centrada en pantalla.
    card_screen_x = trackX + i*STEP_X  → para la activa: trackX + offset = vw/2 - CARD_W/2
    → trackX = vw/2 - CARD_W/2 - offset

    Para Y: la proporción del desplazamiento diagonal es STEP_Y/STEP_X
    → trackY = vh/2 - CARD_H/2 - offset*(STEP_Y/STEP_X)
  */
  const trackX = vw/2 - CARD_W/2 - offset;
  const trackY = vh/2 - CARD_H/2 - offset*(STEP_Y/STEP_X);

  track.style.transform=`translate(${trackX}px,${trackY}px)`;

  /* card activa */
  const cx=vw/2;
  let minD=Infinity, activeCard=null;

  allCards.forEach((card,i)=>{
    const sx = trackX + i*STEP_X + CARD_W/2;
    const dist = Math.abs(sx-cx);
    card.style.opacity = Math.max(0.12, 1-dist/550);
    if(dist<minD){ minD=dist; activeCard=card; }
  });

  allCards.forEach(c=>c.classList.toggle('active',c===activeCard));
  requestAnimationFrame(render);
}
render();

/* mouse */
stage.addEventListener('mousedown',e=>{
  dragging=true; dragX0=e.clientX; dragOff0=offset; velocity=0;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  offset=dragOff0-(e.clientX-dragX0);
});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;
  dragging=false;
  velocity=-(e.clientX-dragX0)*0.05;
});

/* touch */
stage.addEventListener('touchstart',e=>{
  dragging=true; dragX0=e.touches[0].clientX; dragOff0=offset; velocity=0;
},{passive:true});
stage.addEventListener('touchmove',e=>{
  if(!dragging)return;
  offset=dragOff0-(e.touches[0].clientX-dragX0);
},{passive:true});
stage.addEventListener('touchend',e=>{
  dragging=false;
  velocity=-(e.changedTouches[0].clientX-dragX0)*0.06;
});

/* wheel */
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  velocity+=(e.deltaY+e.deltaX)*0.7;
},{passive:false});

/* mobile strip */
const mobileStrip=document.getElementById('mobile-strip');
photos.forEach(p=>{
  const div=document.createElement('div');
  div.className='mobile-card';

  const img=document.createElement('img');
  img.src=p.src; img.alt=p.text;

  const label=document.createElement('div');
  label.className='mobile-meta';
  label.textContent=p.text;

  div.appendChild(img);
  div.appendChild(label);
  mobileStrip.appendChild(div);
  div.onclick=()=>window.location.href='CAMPTION.html';
});
</script>

</body>
</html>
