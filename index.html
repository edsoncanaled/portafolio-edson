<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
width:100%; height:100%;
overflow:hidden;
background:#e8e5e0;
font-family:‘Courier Prime’, monospace;
cursor:grab;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}
body:active { cursor:grabbing; }

header {
position:fixed;
top:28px; left:28px;
font-size:10px;
letter-spacing:.12em;
text-transform:uppercase;
line-height:1.8;
opacity:.45;
z-index:30;
pointer-events:none;
}

#canvas {
position:fixed;
inset:0;
overflow:hidden;
perspective: 2000px;
perspective-origin: 50% 50%;
}

.card {
position:absolute;
transform-origin: center center;
}
.card img {
display:block;
width:100%; height:100%;
object-fit:cover;
pointer-events:none;
}
.card .label {
position:absolute;
bottom:-22px; left:0;
font-size:9px;
letter-spacing:.16em;
text-transform:uppercase;
color:#111;
opacity:0;
transition:opacity .4s;
white-space:nowrap;
pointer-events:none;
}
.card.active .label { opacity:.7; }

/* info overlay en la card activa */
.card .info {
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:12px;
background: linear-gradient(to top, rgba(0,0,0,.55) 0%, transparent 60%);
opacity:0;
transition:opacity .4s;
pointer-events:none;
}
.card.active .info { opacity:1; }

.card .info .project {
font-size:10px;
letter-spacing:.18em;
text-transform:uppercase;
color:#fff;
line-height:1.5;
}
.card .info .sub {
font-size:8px;
letter-spacing:.12em;
text-transform:uppercase;
color:rgba(255,255,255,.55);
margin-top:2px;
}

.hint {
position:fixed;
bottom:22px; left:50%;
transform:translateX(-50%);
font-size:8px;
letter-spacing:.2em;
text-transform:uppercase;
opacity:.18;
pointer-events:none;
z-index:30;
}
</style>

</head>
<body>

<header>
  Edson Canales&nbsp;/&nbsp;Photographer<br>
  Archive
</header>

<div id="canvas"></div>
<div class="hint">← arrastra →</div>

<script>
const BASE = [
  {src:'images/CAMPTION1.jpg',   text:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg', text:'Industrial Silence'},
  {src:'images/CAMPTION1-2.jpg', text:'Concrete Frames'},
  {src:'images/CAMPTION1-3.jpg', text:'Urban Shadows'},
  {src:'images/MAR1.jpg',        text:'Coastal Light'},
  {src:'images/MAR1-2.jpg',      text:'Salt & Wind'},
  {src:'images/NATS1.jpg',       text:'Still Movement'},
  {src:'images/NATS2.jpg',       text:'Natural Study'},
  {src:'images/NATS3.jpg',       text:'Field Notes'},
  {src:'images/NATS4.jpg',       text:'Soft Horizon'}
];

function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){
    const j=0|Math.random()*(i+1);
    [r[i],r[j]]=[r[j],r[i]];
  }
  return r;
}

const photos   = shuffle(BASE);
const N        = photos.length;
const isMobile = window.innerWidth <= 768;

/* tamaño 7:5 landscape */
const CARD_W = isMobile ? 200 : 300;
const CARD_H = Math.round(CARD_W * 5 / 7);

/* valores exactos del playground */
const RX   = -37;
const RY   = -44;
const RZ   = -1;
const STEP = Math.round(CARD_W * 0.08);  /* 10% solapamiento */
const PY   = 0.05;  /* 5% del viewport height */

/* vector de dirección de la tira en pantalla (rotateZ ≈ 0) */
const RAD = RZ * Math.PI / 180;
const COS = Math.cos(RAD);
const SIN = Math.sin(RAD);

const COPIES = 11;
const TOTAL  = N * COPIES;
const CYCLE  = N * STEP;

const canvas   = document.getElementById('canvas');
const allCards = [];

for(let i=0;i<TOTAL;i++){
  const p  = photos[i % N];
  const el = document.createElement('div');
  el.className = 'card';
  el.style.width  = CARD_W+'px';
  el.style.height = CARD_H+'px';

  const img = document.createElement('img');
  img.src=p.src; img.alt=p.text;
  img.draggable=false;

  const lbl = document.createElement('div');
  lbl.className='label';
  lbl.textContent=p.text;

  /* info overlay dentro de la imagen */
  const info = document.createElement('div');
  info.className='info';
  const proj = document.createElement('div');
  proj.className='project';
  proj.textContent=p.text;
  const sub = document.createElement('div');
  sub.className='sub';
  sub.textContent='Edson Canales';
  info.appendChild(proj);
  info.appendChild(sub);

  el.appendChild(img);
  el.appendChild(info);
  el.appendChild(lbl);
  canvas.appendChild(el);
  allCards.push(el);

  el.addEventListener('click',()=>{
    if(el.classList.contains('active'))
      window.location.href='CAMPTION.html';
  });
}

/* ── ESTADO ── */
let offset   = Math.floor(TOTAL/2) * STEP;
let velocity = 0;
let dragging = false, drag0=0, off0=0;

function render(){
  if(!dragging){
    /* snap suave hacia la card más cercana */
    const nearest = Math.round(offset / STEP) * STEP;
    velocity += (nearest - offset) * 0.06;
    velocity *= 0.75;
    offset   += velocity;
  }

  /* loop infinito */
  if(offset < CYCLE*3) offset += CYCLE;
  if(offset > CYCLE*8) offset -= CYCLE;

  const vw       = window.innerWidth;
  const vh       = window.innerHeight;
  const cx       = vw / 2;
  const cy       = vh / 2 + vh * PY;
  const activeIdx = Math.round(offset / STEP);
  const SHOW = 8; /* cards visibles a cada lado */

  allCards.forEach((el, i)=>{
    /* índice relativo al activo, normalizado para el loop */
    let rel = i - activeIdx;

    /* wrap para que rel esté siempre en [-N/2, N/2] */
    while(rel >  N/2) rel -= N;
    while(rel < -N/2) rel += N;

    const absRel = Math.abs(rel);

    if(absRel > SHOW){ el.style.opacity = 0; return; }

    const isActive = rel === 0;
    const sign     = rel > 0 ? 1 : rel < 0 ? -1 : 0;
    const d  = rel * STEP;
    const LIFT = isActive ? -30 : 0;
    const sx = cx + d * COS;
    const sy = cy + d * SIN + LIFT;

    const z = isActive ? 999 : rel > 0 ? 500 - absRel : absRel;

    el.style.transform =
      `translate(${sx - CARD_W/2}px, ${sy - CARD_H/2}px)
       rotateX(${RX}deg) rotateY(${RY}deg) rotateZ(${RZ}deg)
       scale(${isActive ? 1.15 : 1})`;

    el.style.zIndex  = z;
    el.style.opacity = isActive ? 1 : Math.max(0.08, 1 - absRel * 0.15);
    el.classList.toggle('active', isActive);
  });

  requestAnimationFrame(render);
}
render();

/* ── EVENTOS ── */
canvas.addEventListener('mousedown',e=>{
  dragging=true; drag0=e.clientX; off0=offset; velocity=0;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  offset=off0-(e.clientX-drag0)*1.2;
});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;
  dragging=false;
  const vel = -(e.clientX-drag0)*0.07;
  const nearest = Math.round((offset + vel * 8) / STEP) * STEP;
  velocity = (nearest - offset) * 0.12;
});

canvas.addEventListener('touchstart',e=>{
  dragging=true; drag0=e.touches[0].clientX; off0=offset; velocity=0;
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(!dragging)return;
  offset=off0-(e.touches[0].clientX-drag0)*1.2;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  dragging=false;
  const vel = -(e.changedTouches[0].clientX-drag0)*0.07;
  /* snap a la card más cercana */
  const nearest = Math.round((offset + vel * 8) / STEP) * STEP;
  velocity = (nearest - offset) * 0.12;
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  velocity+=(e.deltaY+e.deltaX)*0.8;
},{passive:false});
</script>

</body>
</html>
