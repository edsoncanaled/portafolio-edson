<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edson Canales — Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,...">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @media (pointer: fine) {
            html, body, a { cursor: none; }
        }

        body {
            font-family: 'Courier Prime', monospace;
            background: #ffffff;
            color: #111;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(20px, 4vw, 60px);
            overflow: hidden;
        }

        /* ── CURSOR ── */
        .cursor {
            width: 10px; height: 10px;
            background-color: #000; border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 9999;
            transform: translate3d(-50%, -50%, 0);
            transition: width 0.3s cubic-bezier(0.23,1,0.32,1),
                        height 0.3s cubic-bezier(0.23,1,0.32,1),
                        background-color 0.3s;
            will-change: transform;
        }
        .cursor.active {
            width: 50px; height: 50px;
            background-color: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.2);
        }
        @media (pointer: coarse) { .cursor { display: none; } }

        /* ── HEADER ── */
        .header-main {
            display: flex; justify-content: space-between;
            align-items: flex-start; position: relative; z-index: 20;
        }
        h1.brand-info { font-size: clamp(12px, 2vw, 15px); font-weight: 700; line-height: 1.2; }

        .index-list { text-align: right; font-size: clamp(12px, 2vw, 14px); line-height: 1.6; list-style: none; }
        .index-item { display: flex; justify-content: flex-end; align-items: center; gap: clamp(20px, 3vw, 40px); }
        .index-item a { text-decoration: none; color: inherit; outline: none; position: relative; }
        .index-item a::after {
            content: ''; position: absolute; bottom: 1px; left: 0;
            width: 0; height: 1px; background: #111;
            transition: width 0.35s cubic-bezier(0.23,1,0.32,1);
        }
        .index-item:hover a::after { width: 100%; }
        .index-item .page-num {
            color: #999; font-size: clamp(11px, 1.5vw, 13px);
            transition: color 0.3s; min-width: 28px; text-align: right;
        }
        .index-item:hover .page-num { color: #111; }

        /* ── STRIP WRAP ── */
        .strip-wrap {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100vw;
            transform: translateY(-50%);
            z-index: 5;
            /* scroll nativo en touch */
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            pointer-events: auto;
        }
        .strip-wrap::-webkit-scrollbar { display: none; }

        .strip {
            display: flex;
            gap: 4px;
            width: max-content;
            /* en desktop: el translateX lo maneja JS.
               en touch: el scroll lo maneja el navegador */
        }

        /* ── THUMB ── */
        .thumb {
            flex: 0 0 auto;
            width: 36px;
            height: clamp(140px, 22vw, 220px);
            overflow: hidden;
            position: relative;
            transition: width 0.55s cubic-bezier(0.23,1,0.32,1);
            cursor: none;
        }

        .thumb.expanded,
        .thumb:hover { width: clamp(160px, 20vw, 260px); }

        .thumb img {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: clamp(160px, 20vw, 260px);
            object-fit: cover;
            display: block;
            filter: grayscale(100%);
            transition: filter 0.5s ease;
            pointer-events: none;
        }
        .thumb.expanded img,
        .thumb:hover img { filter: grayscale(0%); }

        /* ── INFO BADGE ── */
        .thumb-info {
            position: absolute;
            bottom: 0; left: 0;
            width: clamp(160px, 20vw, 260px);
            padding: 10px 12px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .thumb-info .info-project {
            font-size: 10px; color: #999;
            letter-spacing: 0.08em; text-transform: uppercase;
            display: block; margin-bottom: 2px;
        }
        .thumb-info .info-shoot {
            font-size: 12px; font-weight: 700;
            letter-spacing: 0.05em; text-transform: uppercase;
            display: block;
        }
        .thumb-info .info-cta {
            font-size: 10px; color: #999;
            margin-top: 4px; display: block;
        }
        .thumb.expanded .thumb-info,
        .thumb:hover .thumb-info { opacity: 1; transform: translateY(0); }

        /* ── FOOTER ── */
        .footer-portfolio {
            display: flex; align-items: center; gap: clamp(12px, 2vw, 20px);
            position: relative; z-index: 20;
        }
        .arrow {
            font-size: clamp(28px, 6vw, 80px); font-weight: 300;
            transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .footer-portfolio:hover .arrow { transform: translateX(12px); }
        .portfolio-title {
            font-size: clamp(36px, 8vw, 110px);
            font-weight: 700; letter-spacing: -0.05em; line-height: 0.8;
        }

        a { text-decoration: none; color: inherit; outline: none; }

        @media (max-width: 600px) {
            .header-main { flex-direction: column; gap: 20px; }
            .index-item { justify-content: flex-start; }
            .thumb { width: 28px; }
            .strip { gap: 3px; }
        }
    </style>
</head>
<body>

    <div class="cursor" aria-hidden="true"></div>

    <div class="strip-wrap" id="strip-wrap">
        <div class="strip" id="strip"></div>
    </div>

    <header class="header-main">
        <h1 class="brand-info">
            Edson Canales<br>
            <span style="font-weight:400;">Photographer</span>
        </h1>
        <ul class="index-list">
            <li class="index-item">
                <a href="CAMPTION.html">CAMPTION</a>
                <span class="page-num">3-8</span>
            </li>
            <li class="index-item">
                <a href="gallery.html">Editorials</a>
                <span class="page-num">22-25</span>
            </li>
            <li class="index-item">
                <a href="food&drinks.html">Food & Drinks</a>
                <span class="page-num">27-30</span>
            </li>
        </ul>
    </header>

    <div class="main-empty"></div>

    <footer class="footer-portfolio">
        <span class="arrow" aria-hidden="true">→</span>
        <span class="portfolio-title">Portfolio</span>
    </footer>

    <script>
        /* ── CURSOR ── */
        const cursor = document.querySelector('.cursor');
        if (cursor) {
            document.addEventListener('mousemove', e => {
                cursor.style.transform = `translate3d(${e.clientX}px,${e.clientY}px,0) translate(-50%,-50%)`;
            });
            document.querySelectorAll('a').forEach(l => {
                l.addEventListener('mouseenter', () => cursor.classList.add('active'));
                l.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });
        }

        /* ── DATA por sesión ── */
        const camption = [
            { src: 'images/CAMPTION1.jpg',   project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/CAMPTION1-1.jpg', project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/CAMPTION1-2.jpg', project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/CAMPTION1-3.jpg', project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/CAMPTION1-4.jpg', project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/CAMPTION1-5.jpg', project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/CAMPTION1-6.jpg', project: 'Camption', shoot: 'B&W Series', href: 'CAMPTION.html' },
            { src: 'images/MAR1.jpg',        project: 'Camption', shoot: 'Shoot 2',    href: 'CAMPTION.html' },
            { src: 'images/MAR1-2.jpg',      project: 'Camption', shoot: 'Shoot 2',    href: 'CAMPTION.html' },
            { src: 'images/MAR1-3.jpg',      project: 'Camption', shoot: 'Shoot 2',    href: 'CAMPTION.html' },
            { src: 'images/MAR1-4.jpg',      project: 'Camption', shoot: 'Shoot 2',    href: 'CAMPTION.html' },
            { src: 'images/MAR1-7.jpg',      project: 'Camption', shoot: 'Shoot 2',    href: 'CAMPTION.html' },
            { src: 'images/MAR1-8.jpg',      project: 'Camption', shoot: 'Shoot 2',    href: 'CAMPTION.html' },
            { src: 'images/NATS1.jpg',       project: 'Camption', shoot: 'Shoot 3',    href: 'CAMPTION.html' },
            { src: 'images/NATS2.jpg',       project: 'Camption', shoot: 'Shoot 3',    href: 'CAMPTION.html' },
            { src: 'images/NATS3.jpg',       project: 'Camption', shoot: 'Shoot 3',    href: 'CAMPTION.html' },
            { src: 'images/NATS4.jpg',       project: 'Camption', shoot: 'Shoot 3',    href: 'CAMPTION.html' },
        ];

        const editorials = [
            { src: 'images/foto1.jpg', project: 'Editorials', shoot: 'Editorials', href: 'gallery.html' },
            { src: 'images/foto2.jpg', project: 'Editorials', shoot: 'Editorials', href: 'gallery.html' },
            { src: 'images/foto3.jpg', project: 'Editorials', shoot: 'Editorials', href: 'gallery.html' },
            { src: 'images/foto4.jpg', project: 'Editorials', shoot: 'Editorials', href: 'gallery.html' },
            { src: 'images/foto5.jpg', project: 'Editorials', shoot: 'Editorials', href: 'gallery.html' },
            { src: 'images/foto6.jpg', project: 'Editorials', shoot: 'Editorials', href: 'gallery.html' },
        ];

        /* ── INTERCALAR — alterna 2 de camption, 1 de editorial ── */
        function interleave(a, b) {
            const result = [];
            let ai = 0, bi = 0;
            while (ai < a.length || bi < b.length) {
                if (ai < a.length) result.push(a[ai++]);
                if (ai < a.length) result.push(a[ai++]);
                if (bi < b.length) result.push(b[bi++]);
            }
            return result;
        }

        const photos     = interleave(camption, editorials);
        const loopPhotos = [...photos, ...photos, ...photos];

        const strip   = document.getElementById('strip');
        const wrap    = document.getElementById('strip-wrap');
        const isTouch = window.matchMedia('(pointer: coarse)').matches;

        loopPhotos.forEach(data => {
            const div  = document.createElement('div');
            div.className = 'thumb';

            const img  = document.createElement('img');
            img.src    = data.src;
            img.alt    = data.shoot;

            const info = document.createElement('div');
            info.className = 'thumb-info';
            info.innerHTML = `
                <span class="info-project">${data.project}</span>
                <span class="info-shoot">${data.shoot}</span>
                <span class="info-cta">→ Ver proyecto</span>
            `;

            div.appendChild(img);
            div.appendChild(info);
            strip.appendChild(div);

            div.addEventListener('click', () => { window.location.href = data.href; });

            if (isTouch) {
                div.addEventListener('touchstart', (e) => {
                    if (!div.classList.contains('expanded')) {
                        e.preventDefault();
                        document.querySelectorAll('.thumb.expanded').forEach(t => {
                            if (t !== div) t.classList.remove('expanded');
                        });
                        div.classList.add('expanded');
                    }
                }, { passive: false });
            }
        });

        /* ── SCROLL ── */
        if (isTouch) {
            /* MÓVIL: scroll nativo del navegador, sin JS de posición */
            /* Centrar el inicio en el segundo set para simular infinito */
            window.addEventListener('load', () => {
                const oneSet = strip.scrollWidth / 3;
                wrap.scrollLeft = oneSet;
            });

            /* loop infinito con scroll nativo */
            wrap.addEventListener('scroll', () => {
                const oneSet = strip.scrollWidth / 3;
                if (wrap.scrollLeft >= oneSet * 2) wrap.scrollLeft -= oneSet;
                else if (wrap.scrollLeft <= 0)      wrap.scrollLeft += oneSet;
            });

        } else {
            /* DESKTOP: auto-scroll JS */
            let pos    = 0;
            let speed  = 0.5;
            let paused = false;

            function tick() {
                if (!paused) {
                    pos += speed;
                    const totalW = strip.scrollWidth / 3;
                    if (pos >= totalW) pos -= totalW;
                    strip.style.transform = `translateX(-${pos}px)`;
                }
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);

            wrap.addEventListener('mouseenter', () => { paused = true; });
            wrap.addEventListener('mouseleave', () => {
                paused = false;
                document.querySelectorAll('.thumb.expanded').forEach(t => t.classList.remove('expanded'));
            });
        }
    </script>
</body>
</html>
