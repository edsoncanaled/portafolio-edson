<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
width:100%; height:100%;
overflow:hidden;
background:#e8e5e0;
color:#111;
font-family:‘Courier Prime’, monospace;
cursor:grab;
user-select:none;
-webkit-user-select:none;
}
body:active { cursor:grabbing; }

/* ── HEADER ── */
header {
position:fixed;
top:28px; left:28px;
font-size:10px;
letter-spacing:.12em;
text-transform:uppercase;
line-height:1.8;
opacity:.5;
z-index:30;
pointer-events:none;
}

/* ── SCENE ── */
#scene {
position:fixed;
inset:0;
perspective:1000px;
perspective-origin:50% 44%;
overflow:hidden;
}

/* plano isométrico — mismo en desktop y mobile */
#iso-plane {
position:absolute;
top:50%; left:50%;
transform-style:preserve-3d;
will-change:transform;
}

/* ── CARD ── */
.card {
position:absolute;
cursor:pointer;
transform-style:preserve-3d;
}

.card img {
width:100%; height:100%;
object-fit:cover;
display:block;
pointer-events:none;
}

/* sombra debajo */
.card::after {
content:’’;
position:absolute;
inset:0;
background:rgba(0,0,0,.2);
transform:translateZ(-1px) scale(1.02);
filter:blur(8px);
}

/* ── LABEL ── */
.card .label {
position:absolute;
bottom:-16px;
left:0;
font-size:7.5px;
letter-spacing:.18em;
text-transform:uppercase;
opacity:0;
transition:opacity .3s;
white-space:nowrap;
pointer-events:none;
color:#111;
}
.card.active .label { opacity:.65; }

/* borde sutil en card activa */
.card.active img {
outline:1px solid rgba(0,0,0,.3);
}

/* ── HINT ── */
.hint {
position:fixed;
bottom:24px; left:50%;
transform:translateX(-50%);
font-size:8px;
letter-spacing:.2em;
text-transform:uppercase;
opacity:.2;
pointer-events:none;
z-index:30;
}
</style>

</head>
<body>

<header>
  Edson Canales&nbsp;/&nbsp;Photographer<br>
  Archive
</header>

<div id="scene">
  <div id="iso-plane"></div>
</div>

<div class="hint">← arrastra →</div>

<script>
/* ── DATOS ── */
const BASE = [
  {src:'images/CAMPTION1.jpg',   text:'B&W Series'},
  {src:'images/CAMPTION1-1.jpg', text:'Industrial Silence'},
  {src:'images/CAMPTION1-2.jpg', text:'Concrete Frames'},
  {src:'images/CAMPTION1-3.jpg', text:'Urban Shadows'},
  {src:'images/MAR1.jpg',        text:'Coastal Light'},
  {src:'images/MAR1-2.jpg',      text:'Salt & Wind'},
  {src:'images/NATS1.jpg',       text:'Still Movement'},
  {src:'images/NATS2.jpg',       text:'Natural Study'},
  {src:'images/NATS3.jpg',       text:'Field Notes'},
  {src:'images/NATS4.jpg',       text:'Soft Horizon'}
];

function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){
    const j=0|Math.random()*(i+1);
    [r[i],r[j]]=[r[j],r[i]];
  }
  return r;
}

const photos = shuffle(BASE);
const N      = photos.length;

/* ── RESPONSIVE: tamaños según pantalla ── */
const isMobile = window.innerWidth <= 768;
const CARD_W   = isMobile ? 160 : 260;
const CARD_H   = isMobile ? 107 : 174;
const STEP     = isMobile ? 175 : 280;

/* ángulo isométrico — más suave en móvil */
const ROT_X = isMobile ? 48 : 55;
const ROT_Z = isMobile ? -35 : -38;

/* buffer loop infinito */
const COPIES = 9;
const TOTAL  = N * COPIES;
const CYCLE  = N * STEP;

const plane    = document.getElementById('iso-plane');
const allCards = [];

/* ── CREAR CARDS ── */
for(let i=0;i<TOTAL;i++){
  const p  = photos[i % N];
  const el = document.createElement('div');
  el.className='card';
  el.style.width  = CARD_W+'px';
  el.style.height = CARD_H+'px';

  const img = document.createElement('img');
  img.src=p.src; img.alt=p.text;
  img.draggable=false;

  const lbl = document.createElement('div');
  lbl.className='label';
  lbl.textContent=p.text;

  el.appendChild(img);
  el.appendChild(lbl);
  plane.appendChild(el);
  allCards.push(el);

  el.addEventListener('click',()=>{
    if(el.classList.contains('active'))
      window.location.href='CAMPTION.html';
  });
}

/* posición fija en el plano */
allCards.forEach((el,i)=>{
  el.style.left = (i*STEP - CARD_W/2)+'px';
  el.style.top  = (-CARD_H/2)+'px';
});

/* ── ESTADO ── */
let offset   = Math.floor(TOTAL/2) * STEP;
let velocity = 0;
let dragging = false, drag0=0, off0=0;

/* sensibilidad del arrastre — en móvil necesita menos recorrido */
const DRAG_FACTOR = isMobile ? 2.2 : 1.8;
const VEL_FACTOR  = isMobile ? 0.12 : 0.09;

/* ── RENDER ── */
function render(){
  if(!dragging){
    velocity *= 0.91;
    offset   += velocity;
  }

  /* loop infinito sin salto */
  if(offset < CYCLE*3) offset += CYCLE;
  if(offset > CYCLE*6) offset -= CYCLE;

  /* mover el plano */
  plane.style.transform =
    `translate(-50%,-50%)
     rotateX(${ROT_X}deg)
     rotateZ(${ROT_Z}deg)
     translateX(${-offset}px)`;

  /* card activa */
  const activeIdx = Math.round(offset / STEP);

  allCards.forEach((el,i)=>{
    const dx    = Math.abs(i - activeIdx);
    el.style.opacity = Math.max(0.08, 1 - dx * 0.17);
    el.classList.toggle('active', i === activeIdx);
  });

  requestAnimationFrame(render);
}
render();

/* ── EVENTOS mouse ── */
const scene = document.getElementById('scene');

scene.addEventListener('mousedown',e=>{
  dragging=true; drag0=e.clientX; off0=offset; velocity=0;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  offset = off0 - (e.clientX - drag0) * DRAG_FACTOR;
});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;
  dragging=false;
  velocity = -(e.clientX - drag0) * VEL_FACTOR;
});

/* ── EVENTOS touch ── */
scene.addEventListener('touchstart',e=>{
  dragging=true;
  drag0=e.touches[0].clientX;
  off0=offset;
  velocity=0;
},{passive:true});

scene.addEventListener('touchmove',e=>{
  if(!dragging)return;
  offset = off0 - (e.touches[0].clientX - drag0) * DRAG_FACTOR;
  e.preventDefault();
},{passive:false});

scene.addEventListener('touchend',e=>{
  dragging=false;
  velocity = -(e.changedTouches[0].clientX - drag0) * VEL_FACTOR;
});

/* ── RUEDA ── */
scene.addEventListener('wheel',e=>{
  e.preventDefault();
  velocity += (e.deltaY + e.deltaX) * 1.1;
},{passive:false});
</script>

</body>
</html>
