<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edson Canales — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier Prime',monospace;
  background:#fff;
  color:#111;
  height:300vh;
  overflow-x:hidden;
}

/* CURSOR */
.cursor{
  width:10px;height:10px;background:#000;border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:.2s;
}
.cursor.active{
  width:40px;height:40px;
  background:rgba(0,0,0,.08);
}

/* HEADER */
.header{
  position:fixed;
  top:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;
  z-index:10;
  font-size:12px;
}

/* ===== DESKTOP ===== */
.stage{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  perspective:1600px;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.gallery{
  position:relative;
  transform-style:preserve-3d;
}

.card{
  position:absolute;
  width:220px;height:300px;
  transition:transform .6s cubic-bezier(.23,1,.32,1);
  cursor:pointer;
}

.card img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:6px;
  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

/* ===== MOBILE ===== */
.mobile-strip{display:none;}

@media (max-width:768px){

  body{height:auto;overflow:auto;}
  .stage{display:none;}

  .mobile-strip{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:120px 20px;
    scroll-snap-type:x mandatory;
  }

  .mobile-card{
    flex:0 0 auto;
    width:65vw;
    height:80vw;
    scroll-snap-align:center;
  }

  .mobile-card img{
    width:100%;height:100%;
    object-fit:cover;
    border-radius:6px;
  }
}
</style>
</head>

<body>

<div class="cursor"></div>

<div class="header">
  <div>Edson Canales<br>Photographer</div>
  <div>Portfolio</div>
</div>

<!-- DESKTOP -->
<div class="stage">
  <div class="gallery" id="gallery"></div>
</div>

<!-- MOBILE -->
<div class="mobile-strip" id="mobile-strip"></div>

<script>

/* CURSOR */
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
});

/* DATA */
const basePhotos=[
  "images/CAMPTION1.jpg",
  "images/CAMPTION1-1.jpg",
  "images/CAMPTION1-2.jpg",
  "images/CAMPTION1-3.jpg",
  "images/CAMPTION1-4.jpg",
  "images/CAMPTION1-5.jpg",
  "images/CAMPTION1-6.jpg",
  "images/MAR1.jpg",
  "images/MAR1-2.jpg",
  "images/MAR1-3.jpg",
  "images/MAR1-4.jpg",
  "images/MAR1-7.jpg",
  "images/MAR1-8.jpg",
  "images/NATS1.jpg",
  "images/NATS2.jpg",
  "images/NATS3.jpg",
  "images/NATS4.jpg"
];

/* ♾️ CLONAMOS 3 VECES PARA LOOP */
const photos=[...basePhotos, ...basePhotos, ...basePhotos];

const gallery=document.getElementById('gallery');

/* CREAR */
photos.forEach((src,i)=>{
  const card=document.createElement('div');
  card.className='card';

  const img=document.createElement('img');
  img.src=src;

  card.appendChild(img);
  gallery.appendChild(card);

  card.addEventListener('click',()=>{
    if(card.classList.contains('active')){
      window.location.href='CAMPTION.html';
    }else{
      currentIndex=i;
      targetOffset=i*240;
    }
  });
});

const cards=document.querySelectorAll('.card');

/* ESTADO */
let currentIndex=Math.floor(photos.length/2);
let targetOffset=currentIndex*240;
let currentOffset=targetOffset;

/* LOOP RESET INVISIBLE */
function normalizeLoop(){
  const total = basePhotos.length;
  
  if(currentIndex < total){
    currentIndex += total;
    targetOffset = currentIndex * 240;
    currentOffset = targetOffset;
  }

  if(currentIndex >= total*2){
    currentIndex -= total;
    targetOffset = currentIndex * 240;
    currentOffset = targetOffset;
  }
}

/* ANIMACIÓN */
function animate(){

  currentOffset += (targetOffset-currentOffset)*0.08;

  normalizeLoop();

  cards.forEach((card,i)=>{

    const x = i*240 - currentOffset;
    const dist = Math.abs(i-currentIndex);

    const z = -dist*120;
    const scale = 1;
    const rot = dist===0 ? 0 : -35;

    card.classList.toggle('active', i===currentIndex);

    card.style.transform=`
      translateX(${x}px)
      translateZ(${z}px)
      rotateY(${rot}deg)
      scale(${scale})
    `;

    card.style.opacity = dist===0 ? 1 : 0.5;

  });

  requestAnimationFrame(animate);
}

animate();

/* MOBILE */
const mobileStrip=document.getElementById('mobile-strip');

basePhotos.forEach(src=>{
  const div=document.createElement('div');
  div.className='mobile-card';

  const img=document.createElement('img');
  img.src=src;

  div.appendChild(img);
  mobileStrip.appendChild(div);

  div.onclick=()=>window.location.href='CAMPTION.html';
});

</script>

</body>
</html>
