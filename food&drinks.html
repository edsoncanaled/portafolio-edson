<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Edson Canales</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --muted: #999;
            --border: #e8e8e8;
            --font-main: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: var(--font-main);
            color: var(--text);
            min-height: 100vh;
        }

        /* --- NAV --- */
        nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 30px 40px; font-size: 11px; z-index: 100;
            text-transform: uppercase;
            background: linear-gradient(to bottom, white 60%, transparent);
        }
        nav a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        nav a:hover { opacity: 0.5; }

        /* --- PAGE HEADER --- */
        .page-header {
            padding: 110px 40px 40px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .page-header h1 {
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
        }
        .page-header .count {
            font-size: 10px; color: var(--muted);
            letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* --- MASONRY GRID --- */
        .masonry {
            columns: 3;
            column-gap: 6px;
            padding: 6px 6px 80px;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 6px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .masonry-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* foto */
        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(15%);
            transition: filter 0.5s ease, transform 0.5s cubic-bezier(0.23,1,0.32,1);
        }
        .masonry-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.02);
        }

        /* video */
        .masonry-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s cubic-bezier(0.23,1,0.32,1);
        }
        .masonry-item:hover video {
            transform: scale(1.02);
        }

        /* badge de video */
        .video-badge {
            position: absolute;
            top: 10px; left: 10px;
            font-size: 9px; letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            background: rgba(0,0,0,0.45);
            padding: 3px 8px;
            pointer-events: none;
        }

        /* overlay info */
        .masonry-item .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 28px 14px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }
        .masonry-item:hover .overlay { opacity: 1; }

        .overlay .o-series {
            font-size: 9px; color: rgba(255,255,255,0.7);
            letter-spacing: 0.1em; text-transform: uppercase;
            display: block; margin-bottom: 3px;
        }
        .overlay .o-title {
            font-size: 12px; font-weight: 700; color: #fff;
            letter-spacing: 0.06em; text-transform: uppercase;
            display: block;
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none;
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.97);
            z-index: 300;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #lightbox.active { display: flex; }

        #lightbox img, #lightbox video {
            max-height: 82vh;
            max-width: 88vw;
            display: block;
            object-fit: contain;
        }
        #lb-video { display: none; }
        #lb-img   { display: none; }

        .lb-meta {
            margin-top: 16px; text-align: center;
        }
        .lb-meta .lb-series {
            font-size: 10px; color: var(--muted);
            letter-spacing: 0.1em; text-transform: uppercase;
            display: block; margin-bottom: 4px;
        }
        .lb-meta .lb-title {
            font-size: 13px; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
        }

        .lb-close {
            position: fixed; top: 30px; right: 40px;
            font-size: 11px; text-transform: uppercase;
            cursor: pointer; font-family: var(--font-main);
            background: none; border: none; color: #000;
            transition: opacity 0.3s; letter-spacing: 0.08em;
        }
        .lb-close:hover { opacity: 0.5; }

        .lb-prev, .lb-next {
            position: fixed; top: 50%;
            transform: translateY(-50%);
            font-size: 20px; background: none; border: none;
            cursor: pointer; font-family: var(--font-main);
            color: #000; padding: 0 20px;
            transition: opacity 0.3s;
        }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
        .lb-prev:hover, .lb-next:hover { opacity: 0.4; }

        /* --- FOOTER --- */
        footer {
            padding: 30px 40px; font-size: 10px;
            color: var(--muted); text-transform: uppercase;
            display: flex; justify-content: space-between;
            border-top: 0.5px solid var(--border);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .masonry { columns: 2; }
            nav { padding: 20px; }
            .page-header { padding: 80px 20px 30px; }
        }
        @media (max-width: 500px) {
            .masonry { columns: 2; column-gap: 4px; padding: 4px 4px 60px; }
            .masonry-item { margin-bottom: 4px; }
            nav { padding: 18px 20px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="width:200px;"><a href="index.html">← BACK</a></div>
        <div style="width:200px; text-align:right;"><a href="CAMPTION.html">ABÚ COFFEE</a></div>
    </nav>

    <div class="page-header">
        <h1>Film Series — ABU Coffee</h1>
        <span class="count" id="photo-count"></span>
    </div>

    <div class="masonry" id="masonry"></div>

    <footer>
        <span>© 2024 Edson Canales</span>
        <span>edsoncanales.art</span>
    </footer>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <button class="lb-close" onclick="closeLightbox()">× Close</button>
        <button class="lb-prev"  onclick="stepLightbox(-1)">←</button>
        <button class="lb-next"  onclick="stepLightbox(1)">→</button>
        <img   id="lb-img"   src="" alt="">
        <video id="lb-video" autoplay loop muted playsinline></video>
        <div class="lb-meta">
            <span class="lb-series" id="lb-series"></span>
            <span class="lb-title"  id="lb-title"></span>
        </div>
    </div>

    <script>
        /*
         * Intercalar videos entre fotos:
         * foto1-4 → video1 → foto5-8 → video2 → foto9-10 → video3 → foto11-12
         */
        const items = [
            { type: 'photo', src: 'images/cafeteria/foto1c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto2c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto3c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto4c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'video', src: 'images/cafeteria/0126(1).mp4', series: '2024 — ABU Coffee', title: 'Behind the lens' },
            { type: 'photo', src: 'images/cafeteria/foto5c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto6c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto7c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto8c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'video', src: 'images/cafeteria/0203.mp4',    series: '2024 — ABU Coffee', title: 'Behind the lens' },
            { type: 'photo', src: 'images/cafeteria/foto9c.JPG',  series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto10c.JPG', series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'video', src: 'images/cafeteria/0210(2).mp4', series: '2024 — ABU Coffee', title: 'Behind the lens' },
            { type: 'photo', src: 'images/cafeteria/foto11c.JPG', series: '2024 — ABU Coffee', title: 'Film Series' },
            { type: 'photo', src: 'images/cafeteria/foto12c.JPG', series: '2024 — ABU Coffee', title: 'Film Series' },
        ];

        const masonry = document.getElementById('masonry');
        document.getElementById('photo-count').textContent = items.length + ' frames';

        /* construir grid */
        items.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'masonry-item';

            if (p.type === 'video') {
                const vid = document.createElement('video');
                vid.src         = p.src;
                vid.autoplay    = true;
                vid.loop        = true;
                vid.muted       = true;
                vid.playsInline = true;
                vid.setAttribute('playsinline', '');
                vid.setAttribute('muted', '');

                const badge = document.createElement('div');
                badge.className   = 'video-badge';
                badge.textContent = '▶ Video';

                item.appendChild(vid);
                item.appendChild(badge);
            } else {
                const img   = document.createElement('img');
                img.src     = p.src;
                img.alt     = p.title;
                img.loading = 'lazy';
                item.appendChild(img);
            }

            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `
                <span class="o-series">${p.series}</span>
                <span class="o-title">${p.title}</span>
            `;
            item.appendChild(overlay);

            item.addEventListener('click', () => openLightbox(i));
            masonry.appendChild(item);
        });

        /* reveal al scroll */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const idx = Array.from(masonry.children).indexOf(entry.target);
                    setTimeout(() => entry.target.classList.add('visible'), (idx % 3) * 80);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.08 });

        document.querySelectorAll('.masonry-item').forEach(el => observer.observe(el));

        /* ── LIGHTBOX ── */
        let currentIdx = 0;

        const lbImg   = document.getElementById('lb-img');
        const lbVideo = document.getElementById('lb-video');

        function openLightbox(idx) {
            currentIdx = idx;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
        }

        function updateLightbox() {
            const p = items[currentIdx];
            document.getElementById('lb-series').textContent = p.series;
            document.getElementById('lb-title').textContent  = p.title;

            if (p.type === 'video') {
                lbImg.style.display   = 'none';
                lbVideo.style.display = 'block';
                lbVideo.src           = p.src;
                lbVideo.load();
                lbVideo.play();
            } else {
                lbVideo.style.display = 'none';
                lbVideo.pause();
                lbImg.style.display   = 'block';
                lbImg.style.opacity   = '0';
                lbImg.src             = p.src;
                lbImg.onload = () => { lbImg.style.transition = 'opacity 0.3s'; lbImg.style.opacity = '1'; };
            }
        }

        function stepLightbox(dir) {
            currentIdx = (currentIdx + dir + items.length) % items.length;
            updateLightbox();
        }

        function closeLightbox() {
            lbVideo.pause();
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape')     closeLightbox();
            if (e.key === 'ArrowRight') stepLightbox(1);
            if (e.key === 'ArrowLeft')  stepLightbox(-1);
        });
    </script>
</body>
</html>
