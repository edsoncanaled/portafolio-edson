<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works | Edson Canales</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --text: #000000;
    --font-main: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-main);
    color: var(--text);
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 30px 40px;
    font-size: 11px;
    z-index: 100;
    text-transform: uppercase;
    background: linear-gradient(to bottom, white 50%, transparent);
}

nav a { text-decoration: none; color: inherit; }

/* UI */
.ui-overlay {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 110px 0 80px 0;
    pointer-events: none;
}

.text-wrapper { width: 260px; }

#project-id { font-size: 10px; color: #999; }
#project-client { font-size: 13px; font-weight: 700; }
#project-title { font-size: 12px; }
#project-type { font-size: 11px; color: #666; }

/* CAROUSEL */
.gallery-viewport {
    height: 100vh;
    display: flex;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 calc(50vw - 130px);
}

.gallery-viewport::-webkit-scrollbar { display: none; }

.work-card {
    flex: 0 0 260px;
    margin: 0 20px;
    transform: scale(0.95);
    opacity: 0.5;
    transition: 0.5s;
    cursor: pointer;
}

.work-card img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

.work-card.active {
    transform: scale(1.05);
    opacity: 1;
}

/* DETAIL */
#project-detail-view {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100vh;
    background: white;
    display: none;
    opacity: 0;
    overflow-y: auto;
}

.detail-content {
    padding: 40px 20vw;
}

.detail-image {
    width: 100%;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(50px);
}

.back-btn-top {
    padding: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<nav>
<div><a href="index.html">← BACK</a></div>
<div>M2. WORKS</div>
<div>M3. CONTACT</div>
</nav>

<div class="ui-overlay">
<div class="text-wrapper">
<span id="project-id"></span>
<div id="project-client"></div>
</div>
<div class="text-wrapper">
<span id="project-title"></span>
<span id="project-type"></span>
</div>
</div>

<main class="gallery-viewport" id="slider"></main>

<div id="project-detail-view">
<div class="back-btn-top" onclick="closeProject()">← BACK</div>
<div class="detail-content" id="detail-container"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
const projectsData = [
{
    id: "2024",
    client: "B&W SERIES",
    title: "Shoot 01",
    type: "35mm Film",
    cover: "images/foto1.jpg",
    images: [
        "images/foto1.jpg",
        "images/foto2.jpg",
        "images/foto3.jpg",
        "images/foto4.jpg",
        "images/foto5.jpg",
        "images/foto6.jpg"
    ]
}
];

const slider = document.getElementById('slider');
const detailView = document.getElementById('project-detail-view');
const detailContainer = document.getElementById('detail-container');

/* CREAR CARDS */
projectsData.forEach(p => {
    const div = document.createElement('div');
    div.className = 'work-card';
    div.dataset.id = p.id;
    div.innerHTML = `<img src="${p.cover}">`;
    slider.appendChild(div);
});

/* CLONES (para infinito) */
const original = Array.from(slider.children);
original.forEach(c => slider.appendChild(c.cloneNode(true)));
original.reverse().forEach(c => slider.prepend(c.cloneNode(true)));

const cards = document.querySelectorAll('.work-card');
slider.scrollLeft = 300;

/* CENTRO */
function checkCenter() {
    let center = window.innerWidth / 2;
    let closest = null;
    let min = Infinity;

    cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const dist = Math.abs(center - (rect.left + rect.width/2));
        if(dist < min) {
            min = dist;
            closest = card;
        }
    });

    cards.forEach(c => c.classList.remove('active'));
    if(closest) {
        closest.classList.add('active');
        const data = projectsData[0];
        document.getElementById('project-id').innerText = data.id;
        document.getElementById('project-client').innerText = data.client;
        document.getElementById('project-title').innerText = data.title;
        document.getElementById('project-type').innerText = data.type;
    }
}

slider.addEventListener('scroll', checkCenter);

/* CLICK */
slider.addEventListener('click', (e) => {
    const card = e.target.closest('.work-card');
    if(card) openProject();
});

/* OPEN */
function openProject() {
    const data = projectsData[0];

    detailContainer.innerHTML = data.images.map(img =>
        `<img src="${img}" class="detail-image">`
    ).join('');

    detailView.style.display = 'block';

    gsap.to(detailView, { opacity: 1 });

    gsap.utils.toArray(".detail-image").forEach(img => {
        gsap.to(img, {
            opacity: 1,
            y: 0,
            duration: 1,
            scrollTrigger: {
                trigger: img,
                start: "top 80%"
            }
        });
    });
}

/* CLOSE */
function closeProject() {
    ScrollTrigger.getAll().forEach(t => t.kill());
    gsap.to(detailView, {
        opacity: 0,
        onComplete: () => detailView.style.display = 'none'
    });
}

window.onload = checkCenter;
</script>

</body>
</html>
